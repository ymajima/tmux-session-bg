# Example TPM configuration for this plugin.
# Place the repository at ~/.tmux/plugins/tmux-session-bg and add:
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'local/tmux-session-bg'

# Optional overrides:
# set -g @session_bg_script "$HOME/.tmux/plugins/tmux-session-bg/scripts/.session-bg.sh"
# set -g @session_bg_reset_on_detach "1"

run '~/.tmux/plugins/tpm/tpm'
